<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — First Aid Angel</title>
    <link rel="icon" href="/favicon-32.png" />
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; padding: 0; font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; background: #fffaf0; color: #2a1a05; }
      main { max-width: 560px; margin: 0 auto; padding: 48px 24px; text-align: center; }
      h1 { font-size: 1.6rem; margin: 16px 0 8px; }
      p { line-height: 1.5; color: #5a4520; }
      a.btn { display: inline-block; margin-top: 20px; padding: 12px 20px; background: #d97706; color: #fff; border-radius: 999px; text-decoration: none; font-weight: 600; }
      a.tel { display: inline-block; margin-top: 24px; font-size: 1.1rem; font-weight: 700; color: #b91c1c; text-decoration: none; }
      .logo { width: 80px; height: 80px; }
    </style>
  </head>
  <body>
    <main>
      <img class="logo" src="/icon-192.png" alt="First Aid Angel" />
      <h1>You're offline</h1>
      <p>Some pages aren't cached yet. Reconnect to keep browsing — but in a real emergency:</p>
      <a class="tel" href="tel:000">📞 Call 000 (Australia) · 112 · 911</a>
      <p style="margin-top:32px"><a class="btn" href="/">Try again</a></p>
    </main>
  </body>
</html>
